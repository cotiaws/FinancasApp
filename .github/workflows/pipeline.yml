name: ASP.NET API CI/CD

on: 
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:

  build:
    name: Compilação
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Instalar .NET 9 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restaurar dependências
      run: dotnet restore

    - name: Compilar e publicar a aplicação
      run: dotnet publish ./FinancasApp.API/FinancasApp.API.csproj --configuration Release --output ./output

    - name: Exportar artefatos de build
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: ./output
        retention-days: 7

  test:
    name: Testes
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Instalar .NET 9 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restaurar dependências
      run: dotnet restore

    - name: Criar pasta de resultados
      run: mkdir -p TestResults

    - name: Executar testes xUnit (TRX)
      run: |
        dotnet test ./FinancasApp.Infra.Data.Tests/FinancasApp.Infra.Data.Tests.csproj \
          --no-restore \
          --configuration Release \
          --logger "trx;LogFileName=results.trx" \
          --results-directory ./TestResults

    - name: Instalar Mono (necessário para ReportUnit)
      run: sudo apt-get update && sudo apt-get install -y mono-complete

    - name: Baixar ReportUnit CLI
      run: wget https://github.com/reportunit/reportunit/releases/download/v1.5.0/ReportUnit.exe -O ./ReportUnit.exe

    - name: Gerar relatório HTML detalhado
      run: mono ./ReportUnit.exe ./TestResults/results.trx ./TestResults/html

    - name: Verificar arquivos de teste gerados
      run: ls -R ./TestResults

    - name: Exportar relatório de testes
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: ./TestResults/html
        retention-days: 7

  deploy:
    name: Implantação
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3
      - name: Implantação da aplicação
        run: echo "Implantando o sistema em produção..."
